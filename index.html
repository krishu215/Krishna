<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishna Namdev | Web Developer</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lora:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>
:root{
  --black:#0c0c0c;
  --gold:#d4af37;
  --dark:#151515;
  --light:#f5f5f5;
}
*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth;}
body{font-family:'Lora',serif;background:var(--black);color:var(--light);}
h1,h2,h3{font-family:'Playfair Display',serif;}
section{padding:80px 10%;}
.container{max-width:1100px;margin:auto;}
.gold{color:var(--gold);}

/* Navbar */
nav{position:fixed;width:100%;top:0;background:#000;padding:15px 10%;display:flex;justify-content:space-between;z-index:1000;}
nav a{color:#fff;text-decoration:none;margin-left:20px;}
nav a:hover{color:var(--gold);}

/* Hero */
.hero{height:100vh;position:relative;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden;}
.hero video{position:absolute;width:100%;height:100%;object-fit:cover;filter:brightness(0.4);}
#particles-js{position:absolute;inset:0;}
.hero-content{position:relative;z-index:2;}
.hero h1{font-size:50px;margin-bottom:10px;}
.btn{padding:12px 25px;border:1px solid var(--gold);color:var(--gold);text-decoration:none;margin:10px;display:inline-block;transition:0.3s;}
.btn:hover{background:var(--gold);color:#000;box-shadow:0 0 20px var(--gold);}

/* Skills */
.skills-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;margin-top:30px;}
.skill{background:var(--dark);padding:20px;text-align:center;border:1px solid rgba(212,175,55,0.3);transition:0.3s;}
.skill:hover{transform:scale(1.05);border-color:var(--gold);}

/* Contact */
.contact-box{background:var(--dark);padding:30px;margin-top:30px;text-align:center;}
form input, form textarea{
  width:100%;padding:12px;margin:10px 0;
  border:1px solid rgba(212,175,55,0.3);
  background:var(--black);color:#fff;
}
form button{
  padding:12px 25px;
  background:var(--gold);
  border:none;
  cursor:pointer;
  font-weight:bold;
}
form button:disabled{
  background:#777;
  cursor:not-allowed;
}

#form-status{
  margin-top:15px;
  font-weight:bold;
}

/* Floating Icons */
.floating-icon{
  position:fixed;bottom:20px;width:55px;height:55px;
  border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:24px;
  text-decoration:none;z-index:999;
}
#whatsapp{right:20px;background:var(--gold);color:#000;}
#instagram{right:85px;background:#E1306C;color:#fff;}

footer{text-align:center;padding:20px;border-top:1px solid rgba(212,175,55,0.2);margin-top:50px;}

@media(max-width:768px){
.hero h1{font-size:30px;}
section{padding:60px 5%;}
}
</style>
</head>
<body>

<nav>
  <div class="gold"><strong>Krishna</strong></div>
  <div>
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<section class="hero">
  <div id="particles-js"></div>
  <video autoplay muted loop playsinline>
    <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
  </video>
  <div class="hero-content">
    <h1>Krishna Namdev</h1>
    <p class="gold">Web Developer & Tech Expert</p>
    <a href="#contact" class="btn">Hire Me</a>
  </div>
</section>

<section id="about" class="container">
  <h2 class="gold">About Me</h2>
  <p>I build modern, fast, and business-focused websites that help brands grow digitally.</p>
</section>

<section id="skills" class="container">
  <h2 class="gold">Skills</h2>
  <div class="skills-grid">
    <div class="skill">Java</div>
    <div class="skill">Python</div>
    <div class="skill">HTML & CSS</div>
    <div class="skill">JavaScript</div>
  </div>
</section>

<section id="contact" class="container">
  <h2 class="gold">Contact Me</h2>
  <div class="contact-box">
    <form id="contact-form">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
      <button type="submit" id="submit-btn">Send Message</button>
      <p id="form-status"></p>
    </form>
  </div>
</section>

<a href="https://wa.me/919244354361" target="_blank" class="floating-icon" id="whatsapp">💬</a>
<a href="https://www.instagram.com/krishna_namdev_04?igsh=dzU2bjN2cTdteDFn" target="_blank" class="floating-icon" id="instagram">📸</a>

<footer>© 2026 Krishna Namdev</footer>

<script>
// Particles
particlesJS("particles-js", {
  particles: {
    number:{value:50},
    color:{value:"#d4af37"},
    shape:{type:"circle"},
    opacity:{value:0.3},
    size:{value:3},
    line_linked:{enable:true,color:"#d4af37"},
    move:{enable:true,speed:2}
  }
});

// Form AJAX Submit
const form = document.getElementById("contact-form");
const status = document.getElementById("form-status");
const button = document.getElementById("submit-btn");

form.addEventListener("submit", async function(e){
  e.preventDefault();
  button.disabled = true;
  button.innerText = "Sending...";

  const data = new FormData(form);

  const response = await fetch("https://formspree.io/f/xbdabyza",{
    method:"POST",
    body:data,
    headers:{'Accept':'application/json'}
  });

  if(response.ok){
    status.innerHTML="✅ Thank you! Your message has been sent.";
    status.style.color="#d4af37";
    form.reset();
  } else {
    status.innerHTML="❌ Something went wrong. Try again.";
    status.style.color="red";
  }

  button.disabled = false;
  button.innerText = "Send Message";
});
</script>

</body>
</html>
